<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Eyes Everywhere — synthetic demo console</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="banner">SYNTHETIC DATA ONLY — every camera, vehicle and plate on this screen is simulated
  <a href="inspector.html">&rarr; reasoning inspector (see the cascade think)</a></div>
<div id="layout">
  <div id="map"></div>
  <aside id="sidebar">
    <section id="flag-section">
      <h2>Flag target</h2>
      <form id="flag-form">
        <input id="flag-label" placeholder="label (e.g. 'silver camry - case 12')" required>
        <input id="flag-plate" placeholder="plate (optional, e.g. ABC-1234)">
        <div class="row">
          <select id="flag-body">
            <option value="">body: any</option>
            <option>sedan</option><option>suv</option>
            <option>pickup</option><option>wagon</option>
          </select>
          <select id="flag-color">
            <option value="">color: any</option>
            <option>silver</option><option>black</option><option>white</option>
            <option>gray</option><option>red</option><option>blue</option>
          </select>
        </div>
        <button type="submit">Flag</button>
      </form>
    </section>
    <section id="targets-section">
      <h2>Targets</h2>
      <div id="targets"></div>
    </section>
    <section id="reviews-section">
      <h2>Review queue <span id="review-count" class="pill">0</span></h2>
      <div id="reviews"></div>
    </section>
    <section id="alerts-section">
      <h2>Alerts</h2>
      <div id="alerts"></div>
    </section>
    <section id="audit-section">
      <h2>Audit log <span id="audit-badge" class="pill">…</span></h2>
      <div id="audit"></div>
    </section>
  </aside>
</div>
<div id="dossier" class="hidden">
  <div id="dossier-card">
    <button id="dossier-close">&times;</button>
    <div id="dossier-body"></div>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="roadmap.js"></script>
<script src="app.js"></script>
</body>
</html>
